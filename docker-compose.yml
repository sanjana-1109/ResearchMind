version: "3.9"

services:

  # ─── Single image: FastAPI serves frontend + backend ───
  app:
    build: .
    container_name: research_mind
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongo:27017/
    volumes:
      - ./data:/app/data           # uploaded files persist
      - ./chroma_db:/app/chroma_db # vector store persists
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  # ─── MongoDB ───
  mongo:
    image: mongo:7.0
    container_name: research_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data: